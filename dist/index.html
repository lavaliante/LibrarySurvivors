<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Library Survivors</title>
  <style>
    :root {
      color-scheme: dark;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #120d09;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: monospace;
    }

    #game-root {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      box-sizing: border-box;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
      touch-action: none;
      image-rendering: auto;
    }

    #rotate-notice {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      background: rgba(11, 7, 5, 0.92);
      color: #f7e7c1;
      font-size: clamp(18px, 4vw, 28px);
      line-height: 1.4;
      z-index: 20;
      pointer-events: none;
    }

    body.mobile-portrait #rotate-notice {
      display: flex;
    }
  </style>
  <script type="module" crossorigin src="./assets/index-CV3JsAou.js"></script>
</head>
<body>
  <div id="game-root">
    <div id="rotate-notice">Rotate your device to landscape for the best library shift.</div>
  </div>
  <script>
    const updateMobileOrientationState = () => {
      const isTouch = window.matchMedia('(pointer: coarse)').matches;
      const isPortrait = window.innerHeight > window.innerWidth;
      document.body.classList.toggle('mobile-portrait', isTouch && isPortrait);
    };

    const lockLandscape = async () => {
      if (!window.matchMedia('(pointer: coarse)').matches) {
        return;
      }

      try {
        await window.screen?.orientation?.lock?.('landscape');
      } catch (error) {
      }
    };

    document.addEventListener('gesturestart', (event) => event.preventDefault(), { passive: false });
    document.addEventListener('dblclick', (event) => event.preventDefault(), { passive: false });
    document.addEventListener('touchmove', (event) => event.preventDefault(), { passive: false });
    window.addEventListener('resize', updateMobileOrientationState);
    window.addEventListener('orientationchange', updateMobileOrientationState);
    window.addEventListener('pointerdown', lockLandscape, { once: true });
    updateMobileOrientationState();
  </script>
</body>
</html>
